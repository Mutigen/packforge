services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-instruction_hub}
      POSTGRES_USER: ${POSTGRES_USER:-instruction_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-instruction_hub}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-instruction_hub} -d ${POSTGRES_DB:-instruction_hub}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  hub-api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "npm install && npm --workspace @hub/hub-api run dev"
    ports:
      - "${HUB_API_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      PACKS_DIR: ${PACKS_DIR:-/workspace/packs}
      HUB_MEMORY_FILE: ${HUB_MEMORY_FILE:-/workspace/.hub-data/memory.json}
      POSTGRES_URL: postgres://${POSTGRES_USER:-instruction_hub}:${POSTGRES_PASSWORD:-instruction_hub}@postgres:5432/${POSTGRES_DB:-instruction_hub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - ../..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  mcp-gateway:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "npm install && npm --workspace @hub/mcp-gateway run start"
    environment:
      NODE_ENV: development
      PACKS_DIR: ${PACKS_DIR:-/workspace/packs}
      HUB_MEMORY_FILE: ${HUB_MEMORY_FILE:-/workspace/.hub-data/memory.json}
    volumes:
      - ../..:/workspace
    depends_on:
      hub-api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data: