name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx turbo build
      - run: npx turbo test
      - run: npm run validate:packs

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
