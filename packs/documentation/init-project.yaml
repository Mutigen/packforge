    - analyse
  domains:
    - developer-tools
    - open-source
  phases:
    - discovery
  risk_profiles:
    - prototype
conflicts_with: []
compatible_with:
  - project-excellence
  - creating-skills
  - agent-customization
provenance:
  source_system: obsidian-compiler
  source_refs:
    - vault:init-project-blueprint.md
  compiled_at: '2026-04-07T01:50:26.850Z'
  compiler_version: 0.1.0
approval:
  state: approved
maturity:
  level: stable
execution_policy:
  allowed_targets:
    - client_workspace
    - sandbox_container
  requires_human_confirm: false
